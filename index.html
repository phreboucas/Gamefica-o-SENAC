<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Pedagógico Senac</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --senac-blue: #004587;
            --senac-orange: #f39200;
            --senac-light-blue: #00a1e4;
        }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #f1f5f9;
        }
        .board-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 24px;
        }
        .board-tile {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            transition: all 0.3s ease;
            border: 3px solid white;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            text-align: center;
            line-height: 1;
        }
        .tile-blue { background: linear-gradient(135deg, #004587 0%, #002d58 100%); }
        .tile-orange { background: linear-gradient(135deg, #f39200 0%, #d97706 100%); }
        .tile-light-blue { background: linear-gradient(135deg, #00a1e4 0%, #007bb0 100%); }
        
        .player-pawn {
            position: absolute;
            width: 50px;
            height: 50px;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 50;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.4));
            pointer-events: none;
        }

        .option-btn {
            transition: all 0.2s ease;
            border: 2px solid #e2e8f0;
        }
        .option-btn:not(:disabled):hover {
            transform: translateY(-2px);
            border-color: var(--senac-blue);
            background-color: #f0f9ff;
        }
        .option-correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .option-wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        .btn-next {
            background: linear-gradient(to right, #059669, #10b981);
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
        }

        /* Canvas de confetti fixo sobre tudo */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }

        /* Troféu pulsante com brilho */
        @keyframes trophy-pop {
            0%   { transform: scale(0.5) rotate(-10deg); opacity: 0; }
            60%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
            80%  { transform: scale(0.95) rotate(-3deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes trophy-glow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(243,146,0,0.4)); }
            50%       { filter: drop-shadow(0 0 24px rgba(243,146,0,0.9)); }
        }
        .trophy-anim {
            display: inline-block;
            animation: trophy-pop 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                       trophy-glow 2s ease-in-out 0.7s infinite;
        }

        /* Score counter animado */
        @keyframes score-reveal {
            from { opacity: 0; transform: translateY(20px) scale(0.8); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .score-reveal {
            animation: score-reveal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s both;
        }

        /* Faixa de parabéns */
        @keyframes banner-slide {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .banner-anim {
            animation: banner-slide 0.5s ease 1s both;
        }

        /* Estrelinhas decorativas */
        @keyframes star-float {
            0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-60px) rotate(360deg); opacity: 0; }
        }
        .star {
            position: absolute;
            font-size: 20px;
            animation: star-float 2s ease-in-out infinite;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Canvas do confetti -->
    <canvas id="confetti-canvas"></canvas>

    <!-- ECRÃ DE SELEÇÃO DE PERFIL -->
    <div id="setup-screen" class="max-w-4xl w-full bg-white rounded-[2.5rem] shadow-2xl p-12 text-center border-b-8 border-[#f39200]">
        <div class="mb-8 flex justify-center">
            <div class="bg-slate-100 p-6 rounded-full">
                <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 50L50 10L90 50L50 90L10 50Z" fill="#004587"/>
                    <circle cx="50" cy="50" r="15" fill="#f39200"/>
                </svg>
            </div>
        </div>
        <h1 class="text-4xl font-black text-slate-800 mb-2 tracking-tight">Trilha Pedagógica Senac</h1>
        <p class="text-slate-400 font-bold uppercase tracking-widest text-xs mb-12">Escolha o seu papel para iniciar o desafio</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <button onclick="startGame('docente')" class="group p-10 rounded-3xl border-4 border-slate-50 hover:border-[#004587] transition-all bg-slate-50 hover:bg-white hover:shadow-2xl">
                <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">👨‍🏫</div>
                <h2 class="text-2xl font-black text-[#004587]">DOCENTE</h2>
                <p class="text-slate-500 text-sm mt-3">Questões sobre o <b>MPS</b> e práticas pedagógicas</p>
            </button>

            <button onclick="startGame('estudante')" class="group p-10 rounded-3xl border-4 border-slate-50 hover:border-[#f39200] transition-all bg-slate-50 hover:bg-white hover:shadow-2xl">
                <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">👩‍🎓</div>
                <h2 class="text-2xl font-black text-[#f39200]">ESTUDANTE</h2>
                <p class="text-slate-500 text-sm mt-3">Foco no desenvolvimento das <b>Marcas Formativas</b></p>
            </button>
        </div>
    </div>

    <!-- ECRÃ DO JOGO -->
    <div id="game-screen" class="hidden w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Tabuleiro -->
        <div class="lg:col-span-7 bg-white rounded-[2.5rem] shadow-xl p-8 relative min-h-[600px] flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-4">
                    <div id="role-icon" class="w-14 h-14 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg"></div>
                    <div>
                        <h3 id="game-title" class="text-xl font-black text-slate-800 leading-none uppercase">DESAFIO</h3>
                        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mt-1">Jornada do Conhecimento</p>
                    </div>
                </div>
                <div class="bg-slate-50 px-6 py-3 rounded-2xl border border-slate-100 text-center shadow-inner">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Pontuação</p>
                    <p id="score-display" class="text-2xl font-black text-[#004587]">0</p>
                </div>
            </div>

            <div id="board-area" class="relative bg-slate-50 rounded-[2rem] p-4 flex-grow border border-slate-100 overflow-hidden">
                <div id="pawn" class="player-pawn text-4xl flex items-center justify-center"></div>
                <div id="board" class="board-container h-full"></div>
            </div>
        </div>

        <!-- Painel Lateral -->
        <div class="lg:col-span-5 bg-white rounded-[2.5rem] shadow-xl p-8 flex flex-col border-t-[10px]" id="side-panel">
            
            <!-- Início -->
            <div id="start-msg" class="h-full flex flex-col items-center justify-center text-center py-10">
                <div class="w-24 h-24 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-8 text-5xl">🎯</div>
                <h3 class="text-2xl font-black text-slate-800 mb-4">Tudo Pronto!</h3>
                <p class="text-slate-500 mb-10 leading-relaxed">Responda corretamente para mover o seu peão até à meta.</p>
                <button onclick="showQuestion()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black hover:bg-[#004587] hover:scale-[1.02] transition-all shadow-lg uppercase">Começar</button>
            </div>

            <!-- Quiz -->
            <div id="quiz-area" class="hidden h-full flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <span id="q-count" class="text-[11px] font-black bg-slate-100 px-4 py-2 rounded-full text-slate-500 border border-slate-200 uppercase">Questão 1/10</span>
                </div>
                
                <div class="flex-grow">
                    <h4 id="q-text" class="text-lg font-bold text-slate-800 mb-8 leading-snug">...</h4>
                    <div id="options-container" class="space-y-4"></div>
                </div>
                
                <div id="action-area" class="mt-8 pt-6 border-t border-slate-100">
                    <div id="feedback-box" class="hidden p-4 rounded-2xl text-center font-bold mb-4 animate-bounce"></div>
                    <button id="btn-next" onclick="moveToNext()" class="hidden btn-next w-full py-5 text-white rounded-2xl font-black hover:brightness-110 transition-all flex items-center justify-center gap-3 text-lg uppercase">
                        Próxima Questão 
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Finalização -->
            <div id="finish-area" class="hidden h-full flex flex-col items-center justify-center text-center relative overflow-hidden">
                
                <!-- Estrelinhas flutuantes decorativas -->
                <span class="star" style="left:10%;top:20%;animation-delay:0s;">⭐</span>
                <span class="star" style="left:80%;top:30%;animation-delay:0.5s;">🌟</span>
                <span class="star" style="left:50%;top:10%;animation-delay:1s;">✨</span>
                <span class="star" style="left:25%;top:50%;animation-delay:1.5s;">⭐</span>
                <span class="star" style="left:70%;top:60%;animation-delay:0.8s;">🌟</span>

                <div class="trophy-anim text-8xl mb-6">🏆</div>

                <div class="banner-anim mb-2">
                    <span class="text-2xl">🎉</span>
                    <h2 class="text-3xl font-black text-slate-800 inline mx-2">MISSÃO CUMPRIDA!</h2>
                    <span class="text-2xl">🎉</span>
                </div>
                <p class="banner-anim text-slate-400 text-sm font-bold uppercase tracking-widest mb-8">Parabéns pela sua jornada!</p>
                
                <div class="score-reveal my-6 p-8 bg-blue-50 rounded-[2rem] w-full border-2 border-blue-100 relative">
                    <p class="text-xs font-black text-blue-400 uppercase tracking-widest mb-2">Pontuação Final</p>
                    <p id="final-score" class="text-6xl font-black text-[#004587]">0</p>
                    <p id="final-msg" class="text-sm font-bold text-slate-500 mt-3"></p>
                </div>
                
                <div class="space-y-4 w-full">
                    <button onclick="restartGame()" class="w-full py-5 bg-[#004587] text-white rounded-2xl font-black hover:bg-[#002d58] transition-colors shadow-xl uppercase">Jogar Novamente</button>
                    <button onclick="goToHome()" class="w-full py-5 bg-white border-4 border-slate-100 text-slate-500 rounded-2xl font-black hover:bg-slate-50 transition-colors uppercase">Página Principal</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const questionsDocente = [
            { q: "Para que um aluno seja aprovado no curso, ele precisa atingir qual menção final e qual frequência mínima?", options: ["Menção 'D' e 70% de frequência", "Menção 'D' em todas as UCs e 75% de frequência", "Menção 'A' e 75% de frequência", "Menção 'D' e 80% de frequência"], correct: 1 },
            { q: "Qual função da avaliação no Senac tem o objetivo de verificar aprendizagens prévias dos alunos no início de uma UC?", options: ["Somativa", "Formativa", "Diagnóstica", "Punitiva"], correct: 2 },
            { q: "O que significa a sigla PTD no contexto do planejamento docente?", options: ["Plano de Trabalho Docente", "Projeto Técnico de Disciplina", "Programa de Tutoria Digital", "Plano de Transmissão de Dados"], correct: 0 },
            { q: "Qual estratégia pedagógica do Senac articula competências e marcas formativas através de um desafio real?", options: ["Aula Expositiva", "Projeto Integrador", "Seminário Individual", "Prova Escrita Mensal"], correct: 1 },
            { q: "Segundo o Modelo Pedagógico Senac, o que deve ocorrer se um aluno não atinge o desempenho esperado durante a UC?", options: ["Aprovação automática", "Reprovação imediata", "Recuperação Paralela", "Transferência de turma"], correct: 2 },
            { q: "No Senac, o foco do currículo e da prática docente está voltado para o desenvolvimento de:", options: ["Memorização de conteúdos", "Competências", "Apenas habilidades manuais", "Teoria sem prática"], correct: 1 },
            { q: "Qual dessas NÃO é uma marca formativa do Senac que o docente deve incentivar?", options: ["Atitude Empreendedora", "Domínio Técnico-Científico", "Individualismo Competitivo", "Visão Crítica"], correct: 2 },
            { q: "A avaliação que ocorre de forma contínua durante todo o processo de aprendizagem é chamada de:", options: ["Somativa", "Formativa", "Informativa", "Final"], correct: 1 },
            { q: "O 'aprender a fazer' e 'fazer para aprender' são pilares de qual abordagem do Senac?", options: ["Ensino Tradicional", "Metodologia Ativa", "Educação por Instrução", "Ensino Remoto Passivo"], correct: 1 },
            { q: "Qual menção é dada ao aluno que atinge os indicadores de competência estabelecidos?", options: ["A (Atendido)", "D (Desenvolvido)", "P (Pleno)", "S (Suficiente)"], correct: 1 }
        ];

        const questionsEstudante = [
            { q: "Qual marca formativa envolve proatividade e busca por soluções criativas?", options: ["Domínio Técnico", "Atitude Empreendedora", "Sustentabilidade"], correct: 1 },
            { q: "A marca 'Visão Crítica' incentiva o aluno a:", options: ["Aceitar tudo", "Analisar contextos e propor melhorias", "Ficar em silêncio"], correct: 1 },
            { q: "Respeitar o meio ambiente e a diversidade social faz parte da:", options: ["Atitude Sustentável", "Autonomia Digital", "Domínio Científico"], correct: 0 },
            { q: "Saber usar as ferramentas tecnológicas da profissão é a marca de:", options: ["Comunicação", "Autonomia Digital", "Atitude Ética"], correct: 1 },
            { q: "Trabalhar bem em equipe com empatia é a marca:", options: ["Atitude Colaborativa", "Individualismo", "Liderança Autoritária"], correct: 0 }
        ];

        let currentRole = '';
        let activeQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let canAdvance = false;
        let hadError = false;
        let confettiAnimId = null;

        // ─── CONFETTI ───────────────────────────────────────────────
        const COLORS = ['#004587','#f39200','#00a1e4','#ffffff','#ffd700','#ff6b6b','#51cf66'];

        function launchConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.style.display = 'block';
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;

            const pieces = [];
            const TOTAL = 180;

            for (let i = 0; i < TOTAL; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: -10 - Math.random() * canvas.height * 0.5,
                    w: 8 + Math.random() * 8,
                    h: 5 + Math.random() * 5,
                    color: COLORS[Math.floor(Math.random() * COLORS.length)],
                    rotation: Math.random() * 360,
                    speedY: 2 + Math.random() * 4,
                    speedX: -1.5 + Math.random() * 3,
                    spinSpeed: (Math.random() - 0.5) * 6,
                    opacity: 1,
                    shape: Math.random() > 0.5 ? 'rect' : 'circle'
                });
            }

            let frame = 0;
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let allDone = true;

                pieces.forEach(p => {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rotation += p.spinSpeed;
                    if (frame > 120) p.opacity -= 0.012;
                    p.opacity = Math.max(0, p.opacity);
                    if (p.y < canvas.height + 20) allDone = false;

                    ctx.save();
                    ctx.globalAlpha = p.opacity;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;

                    if (p.shape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    }
                    ctx.restore();
                });

                frame++;
                if (!allDone && frame < 300) {
                    confettiAnimId = requestAnimationFrame(draw);
                } else {
                    canvas.style.display = 'none';
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
            draw();
        }
        // ────────────────────────────────────────────────────────────

        function startGame(role) {
            currentRole = role;
            activeQuestions = role === 'docente' ? questionsDocente : questionsEstudante;
            currentIndex = 0;
            score = 0;
            hadError = false;

            if (confettiAnimId) {
                cancelAnimationFrame(confettiAnimId);
                document.getElementById('confetti-canvas').style.display = 'none';
            }
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('finish-area').classList.add('hidden');
            document.getElementById('start-msg').classList.remove('hidden');
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('score-display').innerText = score;
            
            const icon = document.getElementById('role-icon');
            icon.innerText = role === 'docente' ? '👨‍🏫' : '👩‍🎓';
            icon.style.backgroundColor = role === 'docente' ? '#004587' : '#f39200';
            
            document.getElementById('game-title').innerText = role === 'docente' ? "Missão Docente" : "Trilha Estudante";
            document.getElementById('side-panel').style.borderColor = role === 'docente' ? "#004587" : "#f39200";

            initBoard();
        }

        function initBoard() {
            const board = document.getElementById('board');
            const pawn = document.getElementById('pawn');
            board.innerHTML = '';
            pawn.innerText = currentRole === 'docente' ? '👨‍🏫' : '👩‍🎓';

            const tileClasses = ['tile-blue', 'tile-orange', 'tile-light-blue'];
            for (let i = 0; i <= activeQuestions.length; i++) {
                const tile = document.createElement('div');
                tile.className = `board-tile ${tileClasses[i % 3]}`;
                tile.id = `tile-${i}`;
                let label = i === 0 ? "INÍCIO" : (i === activeQuestions.length ? "FIM" : i);
                tile.innerHTML = `<span class="text-[10px] font-black">${label}</span>`;
                board.appendChild(tile);
            }
            updatePawn();
        }

        function updatePawn() {
            const target = document.getElementById(`tile-${currentIndex}`);
            const pawn = document.getElementById('pawn');
            if (target) {
                pawn.style.left = (target.offsetLeft + (target.offsetWidth/2) - 25) + 'px';
                pawn.style.top = (target.offsetTop + (target.offsetHeight/2) - 25) + 'px';
            }
        }

        function showQuestion() {
            hadError = false;
            document.getElementById('start-msg').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('feedback-box').classList.add('hidden');
            
            const q = activeQuestions[currentIndex];
            document.getElementById('q-count').innerText = `QUESTÃO ${currentIndex + 1} DE ${activeQuestions.length}`;
            document.getElementById('q-text').innerText = q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-5 rounded-2xl bg-white text-slate-700 font-bold text-sm shadow-sm transition-all";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx, btn);
                container.appendChild(btn);
            });
            canAdvance = false;
        }

        function checkAnswer(selectedIdx, btn) {
            if (canAdvance) return;
            const q = activeQuestions[currentIndex];
            const feedback = document.getElementById('feedback-box');
            feedback.classList.remove('hidden');

            if (selectedIdx === q.correct) {
                btn.classList.add('option-correct');
                const gained = hadError ? 5 : 10;
                score += gained;
                document.getElementById('score-display').innerText = score;
                feedback.innerText = hadError
                    ? `+5 pts — Boa! Desta vez acertou. Clique abaixo para avançar.`
                    : `+10 pts — Excelente! Acertou de primeira! Clique abaixo para avançar.`;
                feedback.className = "p-4 rounded-2xl text-center font-bold bg-green-50 text-green-700 border border-green-200 block";
                document.getElementById('btn-next').classList.remove('hidden');
                canAdvance = true;
                document.querySelectorAll('.option-btn').forEach(b => { if(b !== btn) b.disabled = true; });
            } else {
                btn.classList.add('option-wrong');
                score = Math.max(0, score - 2);
                hadError = true;
                document.getElementById('score-display').innerText = score;
                feedback.innerText = "Resposta incorreta. Tente outra vez!";
                feedback.className = "p-4 rounded-2xl text-center font-bold bg-red-50 text-red-700 border border-red-200 block";
                setTimeout(() => {
                    btn.classList.remove('option-wrong');
                    feedback.classList.add('hidden');
                }, 1500);
            }
        }

        function moveToNext() {
            currentIndex++;
            updatePawn();
            if (currentIndex < activeQuestions.length) {
                showQuestion();
            } else {
                showFinish();
            }
        }

        function getFinalMsg(s, max) {
            const pct = max > 0 ? (s / max) * 100 : 0;
            if (pct === 100) return '🏅 Pontuação perfeita! Incrível!';
            if (pct >= 80)  return '🌟 Excelente desempenho!';
            if (pct >= 60)  return '👏 Muito bem! Continue assim.';
            return '💪 Bom esforço! Na próxima vai ainda melhor.';
        }

        function showFinish() {
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('finish-area').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;

            const maxScore = activeQuestions.length * 10;
            document.getElementById('final-msg').innerText = getFinalMsg(score, maxScore);

            // Dispara o confetti com leve delay para sincronizar com a animação do troféu
            setTimeout(launchConfetti, 400);
        }

        function restartGame() {
            startGame(currentRole);
        }

        function goToHome() {
            if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
            document.getElementById('confetti-canvas').style.display = 'none';
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }

        window.addEventListener('resize', () => {
            updatePawn();
            const canvas = document.getElementById('confetti-canvas');
            if (canvas.style.display !== 'none') {
                canvas.width  = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
